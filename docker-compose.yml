# Local telegram-minions stack.
#
# One-command bring-up:
#   docker compose up --build
#
# Mounts:
#   ./minion-data          → /workspace  — cloned repos, transcripts, queue state
#   ~/.claude              → /workspace/home/.claude
#       Reuses your host Claude Code OAuth credentials so you don't have to
#       re-run `claude auth login` inside the container.
#
# Env:
#   Reads from .env if present. Copy .env.example to .env and set the
#   handful you actually want (GITHUB_TOKEN, MINION_API_TOKEN — Telegram
#   secrets are optional).
#
# PWA:
#   The bundled PWA is served at http://localhost:8080 . Pass
#   `MINION_API_TOKEN` as a Bearer header (the web UI prompts for it on
#   first load).

services:
  minion:
    build:
      context: .
      dockerfile: Dockerfile
    image: telegram-minions:local
    container_name: telegram-minion
    env_file:
      - path: .env
        required: false
    environment:
      # Force in-container behavior so smart-local-defaults don't kick in.
      IS_SANDBOX: "true"
      # Bind the API on a fixed port inside the container. Override via .env if needed.
      API_PORT: "${API_PORT:-8080}"
      WORKSPACE_ROOT: "/workspace"
      HOME: "/workspace/home"
      # Allow dev UI on the common Vite ports plus the API host.
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:8080}"
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    volumes:
      # Repos, transcripts, push keys, etc.
      - ./minion-data:/workspace
      # Reuse host Claude credentials if present. Comment this out if you'd
      # rather authenticate inside the container with `claude auth login`.
      - ${HOME}/.claude:/workspace/home/.claude
    restart: unless-stopped
    # Wait for the container to be reachable via the internal health check
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${API_PORT:-8080}/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
