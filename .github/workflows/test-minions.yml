name: Test telegram-minions

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "test/**"
      - "ui/**"
      - "package*.json"
      - "tsconfig.json"
      - "eslint.config.js"
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "ui/**"
      - "package*.json"
      - "tsconfig.json"
      - "eslint.config.js"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Lint UI
        run: cd ui && npm run lint

      - name: Typecheck UI
        run: cd ui && npm run typecheck

      - name: Test UI
        run: cd ui && npm run test
