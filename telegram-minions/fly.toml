app = "telegram-minions"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  WORKSPACE_ROOT = "/workspace"
  GOOSE_PROVIDER = "claude-acp"
  GOOSE_MODEL = "default"
  HOME = "/workspace/home"
  IS_SANDBOX = "true"
  ENABLE_BROWSER_MCP = "true"
  ENABLE_GITHUB_MCP = "true"
  ENABLE_CONTEXT7_MCP = "true"
  ENABLE_MEMORY_MCP = "true"
  MEMORY_FILE_PATH = "/workspace/home/.memory/graph.json"
  PLAYWRIGHT_BROWSERS_PATH = "/opt/pw-browsers"

[[mounts]]
  source = "workspace_data"
  destination = "/workspace"

[[vm]]
  size = "shared-cpu-4x"
  memory = "4gb"
  auto_stop = false
