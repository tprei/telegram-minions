name: Deploy minion

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "Dockerfile"
      - "entrypoint.sh"
      - "fly.toml"
      - "package*.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
